<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Session | Quixxy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body data-page="quiz">
    <div class="background-orb orb-two"></div>
    <div class="background-orb orb-three"></div>

    <header class="topbar shell-width">
      <a href="./dashboard.html" class="brand-mark">
        <span class="brand-dot"></span>
        <span>Quixxy</span>
      </a>
      <nav class="nav-actions">
        <button id="theme-toggle" class="btn btn-ghost theme-toggle" type="button" aria-label="Toggle theme">
          <span class="theme-icon">Dark</span>
        </button>
        <a href="./dashboard.html" class="btn btn-secondary">Back to Dashboard</a>
      </nav>
    </header>

    <main class="shell-width page-stack">
      <div class="inline-note warning-note" data-config-warning hidden>
        Firebase is still using placeholder credentials. Update <code>config/firebase.js</code> before starting quizzes.
      </div>

      <section class="glass-card quiz-stage">
        <div class="quiz-stage-header">
          <div>
            <span class="eyebrow">Quiz session</span>
            <h1 id="quiz-title">Loading quiz...</h1>
            <p class="muted-copy" id="quiz-category">Preparing your questions.</p>
          </div>

          <div class="timer-pill" id="quiz-timer">15s</div>
        </div>

        <div class="quiz-progress-row">
          <div class="progress-track">
            <div id="quiz-progress-bar" class="progress-bar"></div>
          </div>
          <span id="quiz-progress">Question 0 of 0</span>
        </div>

        <article id="question-card" class="question-panel">
          <div class="question-header">
            <span id="question-index" class="question-count">Question 1</span>
          </div>

          <h2 id="question-text">Your question will appear here.</h2>
          <div id="question-options" class="option-grid"></div>
          <p id="question-feedback" class="feedback-copy"></p>
        </article>
      </section>
    </main>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
